name: "Feature Request"
description: "Neue Funktion vorschlagen"
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem / Motivation"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Vorgeschlagene Loesung"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Prioritaet"
      options:
        - "high"
        - "medium"
        - "low"
    validations:
      required: true
